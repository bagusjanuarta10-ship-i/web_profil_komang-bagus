<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator - Komang Bagus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Komang<span>Dev</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="pendidikan.html">Pendidikan</a></li>
            <li><a href="skill.html">Skill</a></li>
            <li><a href="saya.html">Tentang Saya</a></li>
            <li><a href="form.html">Formulir</a></li>
            <li><a href="kalkulator.html"class="active">Kalkulator</a></li>
            <li><a href="kontak.html">Kontak</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <aside class="profile-card">
            <div class="profile-pic"><img src="FOTO_PROFIL.jpeg" alt="I Komang Bagus Januarta"></div>
            <h1>I Komang Bagus Januarta</h1>
            <p class="role">Mahasiswa Informatika</p>
            <p class="campus">UHN I Gusti Bagus Sugriwa</p>
        </aside>

        <main class="content-area">
            <div class="section-title">
                <h2>Kalkulator Digital</h2>
                <div class="line"></div>
            </div>
            
            <div style="margin-top: 30px;">
                <div class="calculator">
                    <div class="calc-display" id="display">0</div>
                    <div class="calc-buttons">
                        <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                        <button class="calc-btn operator" onclick="appendOperator('/')">÷</button>
                        <button class="calc-btn operator" onclick="appendOperator('*')">×</button>
                        
                        <button class="calc-btn" onclick="appendNumber('7')">7</button>
                        <button class="calc-btn" onclick="appendNumber('8')">8</button>
                        <button class="calc-btn" onclick="appendNumber('9')">9</button>
                        <button class="calc-btn operator" onclick="appendOperator('-')">-</button>
                        
                        <button class="calc-btn" onclick="appendNumber('4')">4</button>
                        <button class="calc-btn" onclick="appendNumber('5')">5</button>
                        <button class="calc-btn" onclick="appendNumber('6')">6</button>
                        <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                        
                        <button class="calc-btn" onclick="appendNumber('1')">1</button>
                        <button class="calc-btn" onclick="appendNumber('2')">2</button>
                        <button class="calc-btn" onclick="appendNumber('3')">3</button>
                        <button class="calc-btn equal" onclick="calculate()">=</button>
                        
                        <button class="calc-btn" onclick="appendNumber('0')" style="grid-column: span 3;">0</button>
                        <button class="calc-btn" onclick="appendNumber('.')">.</button>
                    </div>
                </div>
            </div>

            <script>
                const display = document.getElementById('display');
                let currentInput = '';

                function appendNumber(number) {
                    if (currentInput === '0' && number !== '.') currentInput = '';
                    currentInput += number;
                    display.innerText = currentInput;
                }

                function appendOperator(operator) {
                    if (currentInput === '') return;
                    currentInput += operator;
                    display.innerText = currentInput;
                }

                function clearDisplay() {
                    currentInput = '0';
                    display.innerText = currentInput;
                    currentInput = '';
                }

                function calculate() {
                    try {
                        currentInput = eval(currentInput).toString();
                        display.innerText = currentInput;
                    } catch (e) {
                        display.innerText = 'Error';
                        currentInput = '';
                    }
                }
            </script>
        </main>
    </div>
</body>
</html>
