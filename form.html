<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Kontak - Komang Bagus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #hasil-form {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #eef2f6;
            border-left: 5px solid #2a5298;
            border-radius: 8px;
            color: #333;
        }
        #hasil-form h3 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 10px;
        }
        #hasil-form p {
            margin: 5px 0;
            font-size: 14px;
        }
        .btn-hapus {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-hapus:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Komang<span>Dev</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="pendidikan.html">Pendidikan</a></li>
            <li><a href="skill.html">Skill</a></li>
            <li><a href="saya.html">Tentang Saya</a></li>
            <li><a href="form.html" class="active">Formulir</a></li>
            <li><a href="kalkulator.html">Kalkulator</a></li>
             <li><a href="kontak.html">Kontak</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <aside class="profile-card">
            <div class="profile-pic"><img src="FOTO_PROFIL.jpeg" alt="I Komang Bagus Januarta"></div>
            <h1>I Komang Bagus Januarta</h1>
            <p class="role">Mahasiswa Informatika</p>
            <p class="campus">UHN I Gusti Bagus Sugriwa</p>
        </aside>

        <main class="content-area">
            <div class="section-title">
                <h2>Mari Terhubung</h2>
                <div class="line"></div>
            </div>
            
            <div class="form-container" style="margin-top: 20px;">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Alamat Email</label>
                        <input type="email" id="email" placeholder="contoh@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="pesan">Pesan / Keperluan</label>
                        <textarea id="pesan" rows="4" placeholder="Tulis pesan Anda di sini..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Kirim Pesan</button>
                </form>
            </div>

            <div id="hasil-form"></div>

        </main>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const kotakHasil = document.getElementById('hasil-form');

        // 1. FUNGSI CEK MEMORI BROWSER SAAT HALAMAN DIBUKA
        window.onload = function() {
            // Membaca data yang disimpan di LocalStorage dengan nama "dataPesan"
            const dataTersimpan = localStorage.getItem('dataPesan');
            
            // Jika ada data, langsung tampilkan di layar
            if (dataTersimpan) {
                kotakHasil.style.display = 'block';
                kotakHasil.innerHTML = dataTersimpan + '<br><button onclick="hapusData()" class="btn-hapus">Hapus Pesan Tersimpan</button>';
            }
        };

        // 2. FUNGSI MENYIMPAN DATA SAAT TOMBOL KIRIM DITEKAN
        form.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const inputNama = document.getElementById('nama').value;
            const inputEmail = document.getElementById('email').value;
            const inputPesan = document.getElementById('pesan').value;
            
            // Siapkan kerangka HTML untuk hasil ketikan
            const hasilHTML = `
                <h3>Pesan Terakhir Disimpan!</h3>
                <p><strong>Nama:</strong> ${inputNama}</p>
                <p><strong>Email:</strong> ${inputEmail}</p>
                <p><strong>Pesan:</strong> ${inputPesan}</p>
            `;
            
            // Munculkan kotaknya di layar
            kotakHasil.style.display = 'block';
            kotakHasil.innerHTML = hasilHTML + '<br><button onclick="hapusData()" class="btn-hapus">Hapus Pesan Tersimpan</button>';
            
            // SIMPAN KE DALAM MEMORI BROWSER (LOCALSTORAGE)
            localStorage.setItem('dataPesan', hasilHTML);
            
            form.reset();
        });

        // 3. FUNGSI MENGHAPUS MEMORI
        function hapusData() {
            localStorage.removeItem('dataPesan'); // Hapus dari memori browser
            kotakHasil.style.display = 'none';    // Sembunyikan kotak hasil
            kotakHasil.innerHTML = '';            // Kosongkan isi kotaknya
        }
    </script>
</body>
</html>
